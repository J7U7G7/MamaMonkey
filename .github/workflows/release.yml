name: release
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (so we can commit update.json back)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Build .mmip (asserts info.json version == tag)
        run: node scripts/build.mjs --tag "${GITHUB_REF_NAME}"

      - name: Create GitHub Release with the .mmip (for manual installs)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/*.mmip --title "${GITHUB_REF_NAME}" --notes "Automated release ${GITHUB_REF_NAME}"

      - name: Stage the .mmip under download/ for redirect-free auto-update
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p download
          # Keep only the latest (versioned) file so the repo doesn't accumulate binaries.
          rm -f download/*.mmip
          cp "dist/mamamonkey-${VERSION}.mmip" "download/mamamonkey-${VERSION}.mmip"

      - name: Regenerate update.json pointing at the raw (no-redirect) URL
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node scripts/write-update-manifest.mjs --download-url "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/download/mamamonkey-${VERSION}.mmip"

      - name: Commit update.json + download/ back to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json download/
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "chore: publish ${GITHUB_REF_NAME} (manifest + download artifact)"
            git push origin HEAD:main
          fi
