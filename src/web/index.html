<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MamaMonkey">
  <meta name="theme-color" content="#ff4f9a">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="stylesheet" href="/style.css">
  <title>MamaMonkey</title>
</head>
<body>
  <main id="app">
    <section id="view-now" class="view">
      <h1>🦸‍♀️ MamaMonkey</h1>
      <img id="art" class="art" alt="" hidden>
      <div id="artph" class="art">♪</div>
      <div id="title" class="title">—</div>
      <div id="artist" class="artist">—</div>
      <div id="album" class="album">—</div>
      <div class="progress" id="progress"><div id="bar" class="bar"></div></div>
      <div class="times"><span id="pos">0:00</span><span id="dur">0:00</span></div>
      <div class="transport">
        <button id="prev" aria-label="Previous">⏮</button>
        <button id="playpause" aria-label="Play/Pause">⏯</button>
        <button id="next" aria-label="Next">⏭</button>
      </div>
      <div class="modes">
        <button id="shuffle" class="mode" aria-label="Shuffle">🔀</button>
        <button id="repeat" class="mode" aria-label="Repeat">🔁</button>
        <button id="queueBtn" class="mode" aria-label="Queue">☰</button>
      </div>
      <div class="volume">🔊 <input id="vol" type="range" min="0" max="1" step="0.01" value="0.5"></div>
      <div id="status" class="status">connecting…</div>
      <div id="queuePanel" class="queue" hidden></div>
    </section>

    <section id="view-lib" class="view" hidden>
      <input id="search" class="search" type="search" placeholder="Search library…">
      <div class="segs">
        <button class="seg on" data-view="all">All</button>
        <button class="seg" data-view="artists">Artists</button>
        <button class="seg" data-view="albums">Albums</button>
        <button class="seg" data-view="genres">Genres</button>
        <button class="seg" data-view="ratings">★ Notes</button>
      </div>
      <div id="libList" class="list"></div>
    </section>

    <section id="view-pls" class="view" hidden>
      <div class="plsbar"><button id="newPls" class="seg">＋ New playlist</button></div>
      <div id="plsList" class="list"></div>
    </section>
  </main>
  <nav id="tabs">
    <button class="tab on" data-tab="now">▶<span>Now</span></button>
    <button class="tab" data-tab="lib">🎵<span>Library</span></button>
    <button class="tab" data-tab="pls">☰<span>Playlists</span></button>
  </nav>
  <div id="sheet" class="sheet" hidden></div>
  <script src="/app.js"></script>
</body>
</html>
